apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: time-app-ingress
  namespace: time-app
spec:
  ingressClassName: nginx
  rules:
    - host: time-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 5000