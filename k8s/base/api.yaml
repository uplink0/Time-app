apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: time-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
        - name: api
          image: time-app-api:v2
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5000

          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: time-app-config
                  key: MYSQL_HOST

            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: time-app-config
                  key: MYSQL_PORT

            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: time-app-config
                  key: MYSQL_DATABASE

            - name: MYSQL_USER
              value: root

            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD

---
apiVersion: v1
kind: Service

metadata:
  name: api
  namespace: time-app

spec:
  type: ClusterIP

  selector:
    app: api

  ports:
    - port: 5000
      targetPort: 5000