name: Time App CI

on:
  push:
    branches:
      - main
      - feature/auth
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build, Test and Publish
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: time_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install API dependencies
        working-directory: ./api
        run: npm ci

      - name: Start API
        working-directory: ./api
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: time_db
          JWT_SECRET: ci-test-secret
        run: |
          npm run start > api.log 2>&1 &
          sleep 10
          cat api.log

      - name: Health check
        run: curl -f http://localhost:5000/health

      - name: Register test user
        run: |
          curl -f -X POST http://localhost:5000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"ciuser","email":"ciuser@test.local","password":"Test12345"}'

      - name: Login test user
        run: |
          curl -f -X POST http://localhost:5000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"ciuser","password":"12345678"}' \
            -o login-response.json

      - name: Extract JWT
        run: |
          TOKEN=$(node -e "console.log(require('./login-response.json').token)")
          echo "AUTH_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Test protected endpoint
        run: |
          curl -f http://localhost:5000/api/auth/me \
            -H "Authorization: Bearer $AUTH_TOKEN"

      - name: Test sessions endpoint
        run: |
          curl -f http://localhost:5000/api/sessions \
            -H "Authorization: Bearer $AUTH_TOKEN"

      - name: Install Frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build API image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/time-app-api:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/time-app-api:${{ github.sha }} \
            ./api

      - name: Push API image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/time-app-api:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/time-app-api:${{ github.sha }}

      - name: Build Frontend image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/time-app-frontend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/time-app-frontend:${{ github.sha }} \
            ./frontend

      - name: Push Frontend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/time-app-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/time-app-frontend:${{ github.sha }}

      - name: Deploy to AtlasInfra
        if: github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo k3s ctr images pull docker.io/uplink0/time-app-api:latest
            sudo k3s ctr images pull docker.io/uplink0/time-app-frontend:latest

            sudo k3s kubectl rollout restart deployment/api -n time-app
            sudo k3s kubectl rollout restart deployment/frontend -n time-app

            sudo k3s kubectl rollout status deployment/api -n time-app
            sudo k3s kubectl rollout status deployment/frontend -n time-app