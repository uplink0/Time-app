name: Time App CI

on:
  push:
    branches:
      - main
      - feature/auth
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build and Smoke Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: time_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install API dependencies
        working-directory: ./api
        run: npm ci

      - name: Start API
        working-directory: ./api
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: time_db
          JWT_SECRET: ci-test-secret
        run: |
          npm run start > api.log 2>&1 &
          sleep 10
          cat api.log

      - name: Smoke test API health
        run: curl -f http://localhost:5000/health

      - name: Smoke test auth register
        run: |
          curl -f -X POST http://localhost:5000/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"username":"ciuser","email":"ciuser@test.local","password":"12345678"}'

      - name: Install Frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

      - name: Build API Docker image
        run: docker build -t time-app-api:ci ./api

      - name: Build Frontend Docker image
        run: docker build -t time-app-frontend:ci ./frontend